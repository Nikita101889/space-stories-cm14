- type: entity
  parent: ColMarTechBase
  id: ColMarTechCrewMaintTech
  name: ColMarTech Maintenance Technician Equipment Rack
  description: An automated rack hooked up to a colossal storage of Maintenance Technician standard-issue equipment.
  components:
  - type: AccessReader
    access:
    - [ "CMAccessEngineering" ]
  - type: Sprite
    sprite: _RMC14/Structures/Machines/VendingMachines/ColMarTech/clothing.rsi
  - type: CMAutomatedVendor
    jobs:
    - CMMaintTech
    sections:
    - name: Набор Технического Обслуживания (обязательно)
      takeAll: CMMaintenanceSet
      entries:
      - id: CMVendorBundleCrewMaintenanceEssentials
    - name: Стандартное Оборудование
      takeAll: CMStandard
      entries:
      - id: CMHandsInsulated
      - id: CMHeadsetEngineer
      - id: CMMRE
        name: MRE
      # map
    - name: Шлем
      choices: { CMHelmet: 1 }
      entries:
      - id: CMHeadBeretEngineer
      - id: RMCHardhatWhite
      - id: RMCHardhatOrange
      - id: RMCHardhatBlue
      # Welding helmet
    - name: Костюм
      choices: { CMSuit: 1 }
      entries:
      - id: RMCHazardVestBlack
      - id: RMCHazardVestBlue
      - id: RMCHazardVest
      - id: RMCHazardVestYellow
    - name: Рюкзак
      choices: { CMBackpack: 1 }
      entries:
      - id: CMBackpackMarineTech
      - id: CMSatchelMarineTech
      - id: CMBackpackWelder
        recommended: true
      - id: RMCSatchelWelder
      - id: RMCSatchelWelderChestrig
        recommended: true
    - name: Пояс
      choices: { CMBelt: 1 }
      entries:
      - id: RMCBeltUtilityGeneral
      - id: CMBeltUtilityFilled
        name: пояс M276 для инструментов (полный)
    - name: Подсумки
      choices: { RMCPouch: 2 }
      entries:
      - id: RMCPouchGeneralMedium
      - id: RMCPouchFirstAidInjectors
        name: подсумок первой помощи (многоразовые инъекторы)
      - id: RMCPouchFirstAidSplintsGauzeOintment
        name: подсумок первой помощи (марля, мазь) # TODO RMC14 splints comma
      - id: RMCPouchFirstAidPills
        name: подсумок первой помощи (таблетки)
      - id: RMCPouchConstruction
      #- id: CMElectronicsPouchFull
      #name: электрический подсумок (полный)
      - id: RMCPouchToolsFill
        name: подсумок для инструментов (заполненный)
      - id: RMCPouchFlareFilled
        name: подсумок фаеров (полный)
    - name: Маска
      choices: { CMMask: 1 }
      entries:
      - id: CMMaskGas
      - id: CMMaskCoif
      - id: RMCMaskRebreather
    - name: Аксессуары
      choices: { CMAccessory: 1 }
      entries:
      - id: CMWebbingBrown
      - id: CMWebbingBlack
      - id: CMWebbing

- type: entity
  parent: CMVendorBundleRiflemanApparel
  id: CMVendorBundleCrewMaintenanceEssentials
  name: essential maintenance set
  description: Contains a flashlight and a light replacer.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Misc/Janitorial/light_replacer.rsi
    state: lightreplacer0
  - type: CMVendorBundle
    bundle:
    - CMLightReplacer
    # demo scanner
    - TrashBag
    - RMCToolboxMechanicalFilled
    - RMCFlashlight
