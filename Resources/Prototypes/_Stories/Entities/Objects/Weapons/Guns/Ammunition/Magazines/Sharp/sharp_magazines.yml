- type: entity
  id: STMagazineSharpRifleExplosive
  name: 9X-E sticky explosive dart magazine
  parent: BaseItem
  components:
  - type: Sprite
    sprite: _Stories/Objects/Weapons/Guns/Ammunition/Magazines/Sharp/explosive.rsi
    layers:
    - state: base
      map: [ "enum.GunVisualLayers.Base" ]
    - state: mag-1
      map: [ "enum.GunVisualLayers.Mag" ]
  - type: Item
    size: Small
  - type: Tag
    tags:
    - STSharpRifleMagazine
  - type: BallisticAmmoProvider
    proto: STCartridgeSharpExplosive
    capacity: 10
    mayTransfer: true
    cycleable: true
    soundInsert:
      path: /Audio/_RMC14/Weapons/Guns/Reload/grenade_insert.ogg
    whitelist:
      tags:
      - STSharpCartridgeExplosive
  - type: MagazineVisuals
    magState: mag
    steps: 2
    zeroVisible: false
    zeroOnlyOnEmpty: true
  - type: Appearance

