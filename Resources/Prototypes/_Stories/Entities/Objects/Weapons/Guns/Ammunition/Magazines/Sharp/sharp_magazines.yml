- type: entity
  id: STCartridgeSharpExplosive
  parent: BaseCartridge
  name: deactivated SHARP mine (explosive)
  components:
  - type: Tag
    tags:
    - Cartridge
    - STSharpCartridgeExplosive
  - type: Sprite
    sprite: _Stories/Objects/Weapons/Guns/Projectiles/Sharp/Mines/explosive.rsi
    state: disarmed
  - type: CartridgeAmmo
    proto: STBulletSharpStickyExplosive
    deleteOnSpawn: true

