- type: entity
  id: STSharpMineBase
  abstract: true
  name: SHARP mine
  description: A rapidly-deploying SHARP mine.
  components:
  - type: Clickable
  - type: InteractionOutline
  - type: Transform
    anchored: false
  - type: Physics
    bodyType: Static
    fixedRotation: false
  - type: Fixtures
    fixtures:
      projectile:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.2,-0.2,0.2,0.2"
        hard: false
        mask:
        - BulletImpassable
        - XenoProjectileImpassable
        layer:
        - BulletImpassable
        - XenoProjectileImpassable
  - type: Damageable
    damageContainer: Inorganic
  - type: GenericVisualizer
    visuals:
      enum.Trigger.TriggerVisuals.VisualState:
        enum.ConstructionVisuals.Layer:
          Primed: { state: primed }
          Unprimed: { state: icon }
  - type: SharpMine
    ignoreAnyIff: true
    triggerRadius: 1.0
    levelUpInterval: 75
    maxLifespan: 300
    stickyDartGracePeriod: 0.25
    explosionRadius: 3
    detonateOnDamage:
      types:
        Heat: 1
    level: 1
    maxLevel: 4

- type: entity
  id: STSharpMineExplosiveL1
  name: SHARP mine (explosive)
  parent: STSharpMineBase
  components:
  - type: Sprite
    sprite: _Stories/Objects/Weapons/Guns/Projectiles/Sharp/Mines/explosive.rsi
    drawdepth: Overlays
    layers:
    - state: phase1
      map: [ "enum.ToggleableVisuals.Layer" ]
  - type: Explosive
    explosionType: RMC
    maxIntensity: 20
    intensitySlope: 6
    totalIntensity: 200
    canCreateVacuum: false
  - type: CMExplosionEffect
  - type: CMVocalizeTrigger
  - type: RMCScorchEffect

